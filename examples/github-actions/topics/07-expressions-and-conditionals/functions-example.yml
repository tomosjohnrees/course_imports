name: Built-in Functions Demo

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use contains() to check for a skip label
      - name: Check for skip label
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-ci')"
        run: echo "No skip-ci label found, proceeding..."

      # Use startsWith() to detect feature branches
      - name: Feature branch notice
        if: startsWith(github.head_ref, 'feature/')
        run: echo "This PR comes from a feature branch."

      # Use hashFiles() for intelligent caching
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Use toJSON() for debugging
      - name: Debug PR info
        if: runner.debug == '1'
        run: |
          echo "PR labels: ${{ join(github.event.pull_request.labels.*.name, ', ') }}"
          echo "Full event:"
          echo '${{ toJSON(github.event.pull_request) }}'
