name: Hello World

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        run: echo "Hello, World!"

      - name: Print the date
        run: date

      - name: Show runner info
        run: |
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo "GitHub Actor: $GITHUB_ACTOR"
