name: Contexts Demo

on:
  push:
    branches: [main]

jobs:
  demonstrate-contexts:
    runs-on: ubuntu-latest

    steps:
      - name: Use the github context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Use env context in a conditional
        env:
          DEPLOY_ENV: staging
        if: ${{ env.DEPLOY_ENV == 'staging' }}
        run: echo "Deploying to staging environment"

      - name: Generate an output
        id: version
        run: echo "tag=v1.2.3" >> "$GITHUB_OUTPUT"

      - name: Use the steps context
        run: |
          echo "Version from previous step: ${{ steps.version.outputs.tag }}"

      - name: Use the runner context
        run: |
          echo "OS: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"
          echo "Temp directory: ${{ runner.temp }}"
