name: Scoped Token Permissions

on: push

# Workflow-level: start with minimal permissions
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: test

    # Job-level: grant write only where needed
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
