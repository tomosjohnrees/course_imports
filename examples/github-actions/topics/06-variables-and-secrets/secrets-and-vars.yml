name: Deploy with Secrets and Variables

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure deployment
        # vars are non-sensitive configuration
        # secrets are encrypted credentials
        env:
          DEPLOY_REGION: ${{ vars.DEPLOY_REGION }}
          APP_URL: ${{ vars.APP_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploying to region: $DEPLOY_REGION"
          echo "Application URL: $APP_URL"
          # Secrets are masked - this would print ***
          echo "API Key: $API_KEY"

      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Use the token for authenticated deployment
          curl -X POST "https://api.example.com/deploy" \
            -H "Authorization: Bearer $DEPLOY_TOKEN" \
            -d '{"ref": "${{ github.sha }}"}'
