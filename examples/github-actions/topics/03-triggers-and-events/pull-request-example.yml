name: PR Checks

on:
  pull_request:
    branches:
      - main
      - 'release/*'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'src/**'
      - 'package.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test
