# .github/actions/setup-node-project/action.yml
# A composite action that sets up Node.js and installs dependencies.

name: "Setup Node Project"
description: "Checks out code, installs Node.js, and runs npm ci"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "20"

outputs:
  cache-hit:
    description: "Whether the npm cache was hit"
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci
